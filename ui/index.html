<!doctype html>
<!-- Dark-first defaults so design tokens (--surface-2, --line-2, --pad-*, all
     defined only under [data-theme]/[data-density]) exist from the very first
     paint. Without this, anything rendered before <App/> mounts its
     ThemeProvider — the server-mode auth/setup screens (AuthGate renders them
     instead of App) — had transparent, borderless inputs. ThemeProvider keeps
     these in sync with the user's saved preference once the app mounts. -->
<html lang="en" data-theme="dark" data-density="cozy">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0A0F02" />
    <title>FinSight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
