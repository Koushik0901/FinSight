name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install perl (Windows)
        if: matrix.os == 'windows-latest'
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.38'
      - name: Install Linux deps for Tauri
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Start dbus + gnome-keyring (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y gnome-keyring dbus-x11
          echo -n "" | gnome-keyring-daemon --unlock
          echo -n "" | gnome-keyring-daemon --start --daemonize --components=secrets
      - run: pnpm install --frozen-lockfile
      - run: cargo fmt --all -- --check
      - name: cargo test (Linux, under dbus session)
        if: matrix.os == 'ubuntu-latest'
        run: dbus-run-session -- cargo test --workspace
      - name: cargo test (non-Linux)
        if: matrix.os != 'ubuntu-latest'
        run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: pnpm --filter ui typecheck
      - run: pnpm --filter ui test
      - run: pnpm --filter ui build
      - name: Tauri debug build (Linux, under dbus session)
        if: matrix.os == 'ubuntu-latest'
        run: dbus-run-session -- cargo tauri build --debug
      - name: Tauri debug build (non-Linux)
        if: matrix.os != 'ubuntu-latest'
        run: cargo tauri build --debug
