name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install perl (Windows) for OpenSSL vendored build
        if: matrix.os == 'windows-latest'
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.38'
      - name: Install Linux deps for Tauri
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Start dbus + gnome-keyring (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y gnome-keyring dbus-x11
          echo -n "" | gnome-keyring-daemon --unlock
          echo -n "" | gnome-keyring-daemon --start --daemonize --components=secrets
      - name: cargo test (Linux, under dbus session)
        if: matrix.os == 'ubuntu-latest'
        run: dbus-run-session -- cargo test -p finsight-core
      - name: cargo test (non-Linux)
        if: matrix.os != 'ubuntu-latest'
        run: cargo test -p finsight-core
      - run: cargo clippy -p finsight-core --all-targets -- -D warnings
